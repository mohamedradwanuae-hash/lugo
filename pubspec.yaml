name: sugo_social_host
description: A Sugo-style Social & Host Earning Flutter Application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Backend and Auth
  supabase_flutter: ^2.6.0
  
  # Video and Voice 1-on-1 calls
  zego_uikit_prebuilt_call: ^3.4.0
  
  # Ads Monetization for Caller coins
  google_mobile_ads: ^5.1.0
  
  # Utility for storing quick settings/offline cache
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
